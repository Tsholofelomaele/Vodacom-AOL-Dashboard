<div class="metric-box">
  <h3>Total Leads</h3>
  <p id="total-leads">7,262</p>
</div>

<script>
fetch('data.json')
  .then(response => response.json())
  .then(data => {
    document.getElementById('total-leads').textContent = data.total_leads;
  });
</script>
